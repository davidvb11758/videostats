<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Title Builder - Highlight Collection Manager</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/title_builder.css') }}">
</head>
<body>
    <div class="container">
        <!-- Header -->
        <header>
            <h1>Title Builder</h1>
        </header>

        <div class="main-layout">
            <!-- Main Content Area -->
            <main class="main-content">
                <!-- Background Color Section -->
                <section class="section">
                    <h2>Background Color</h2>
                    <div class="section-content">
                        <label for="bg-color">Background Color:</label>
                        <input type="color" id="bg-color" value="#282828">
                    </div>
                </section>

                <!-- Text Lines Section -->
                <section class="section">
                    <h2>Text Lines</h2>
                    <div class="lines-section">
                        <div class="line-controls" data-line="0">
                            <label class="line-label">Line 1:</label>
                            <input type="text" class="text-input" placeholder="Enter text for line 1" data-field="text">
                            <select class="font-select" data-field="font_style">
                                <option value="Arial">Arial</option>
                            </select>
                            <label class="size-label">Size:</label>
                            <input type="number" class="font-size" min="8" max="200" value="30" data-field="font_size">
                            <label class="checkbox-label">
                                <input type="checkbox" class="bold-checkbox" data-field="font_bold"> Bold
                            </label>
                            <label class="checkbox-label">
                                <input type="checkbox" class="italic-checkbox" data-field="font_italic"> Italic
                            </label>
                            <input type="color" class="color-picker" value="#ffffff" data-field="color">
                        </div>
                        
                        <div class="line-controls" data-line="1">
                            <label class="line-label">Line 2:</label>
                            <input type="text" class="text-input" placeholder="Enter text for line 2" data-field="text">
                            <select class="font-select" data-field="font_style">
                                <option value="Arial">Arial</option>
                            </select>
                            <label class="size-label">Size:</label>
                            <input type="number" class="font-size" min="8" max="200" value="30" data-field="font_size">
                            <label class="checkbox-label">
                                <input type="checkbox" class="bold-checkbox" data-field="font_bold"> Bold
                            </label>
                            <label class="checkbox-label">
                                <input type="checkbox" class="italic-checkbox" data-field="font_italic"> Italic
                            </label>
                            <input type="color" class="color-picker" value="#ffffff" data-field="color">
                        </div>
                        
                        <div class="line-controls" data-line="2">
                            <label class="line-label">Line 3:</label>
                            <input type="text" class="text-input" placeholder="Enter text for line 3" data-field="text">
                            <select class="font-select" data-field="font_style">
                                <option value="Arial">Arial</option>
                            </select>
                            <label class="size-label">Size:</label>
                            <input type="number" class="font-size" min="8" max="200" value="30" data-field="font_size">
                            <label class="checkbox-label">
                                <input type="checkbox" class="bold-checkbox" data-field="font_bold"> Bold
                            </label>
                            <label class="checkbox-label">
                                <input type="checkbox" class="italic-checkbox" data-field="font_italic"> Italic
                            </label>
                            <input type="color" class="color-picker" value="#ffffff" data-field="color">
                        </div>
                        
                        <div class="line-controls" data-line="3">
                            <label class="line-label">Line 4:</label>
                            <input type="text" class="text-input" placeholder="Enter text for line 4" data-field="text">
                            <select class="font-select" data-field="font_style">
                                <option value="Arial">Arial</option>
                            </select>
                            <label class="size-label">Size:</label>
                            <input type="number" class="font-size" min="8" max="200" value="30" data-field="font_size">
                            <label class="checkbox-label">
                                <input type="checkbox" class="bold-checkbox" data-field="font_bold"> Bold
                            </label>
                            <label class="checkbox-label">
                                <input type="checkbox" class="italic-checkbox" data-field="font_italic"> Italic
                            </label>
                            <input type="color" class="color-picker" value="#ffffff" data-field="color">
                        </div>
                    </div>
                </section>

                <!-- Export/Import Buttons -->
                <section class="section">
                    <h2>Settings</h2>
                    <div class="file-buttons">
                        <button id="export-btn" class="btn btn-secondary">Export to JSON</button>
                        <button id="import-btn" class="btn btn-secondary">Import from JSON</button>
                        <input type="file" id="import-file" accept=".json" style="display: none;">
                    </div>
                </section>

                <!-- Preview and Generate Buttons -->
                <section class="section">
                    <h2>Actions</h2>
                    <div class="action-buttons">
                        <button id="preview-btn" class="btn btn-primary">Preview Image</button>
                        <button id="generate-btn" class="btn btn-success">Generate Video</button>
                    </div>
                </section>

                <!-- Preview Image Display -->
                <section class="section" id="preview-section" style="display: none;">
                    <h2>Preview</h2>
                    <div id="preview-container" class="preview-container">
                        <div class="preview-image-wrapper">
                            <img id="preview-image" alt="Preview">
                        </div>
                        <p class="preview-info">Preview size: 1920x1080 (scaled to fit window)</p>
                        <button id="close-preview" class="btn btn-secondary">Close Preview</button>
                    </div>
                </section>

                <!-- Error/Success Messages -->
                <div id="message" class="message" style="display: none;"></div>
            </main>
        </div>
    </div>
    
    <script src="{{ url_for('static', filename='js/title_builder.js') }}"></script>
</body>
</html>
